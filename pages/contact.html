  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>
<body>
    <section>
        <h1>Contact</h1>
        <form action="" method="POST">
            <div>
                <label for="nome">Name:</label>
                <input type="text" id="nome" name="nome" size="30" placeholder="Digite o seu nome" required>
            </div>

            <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
            </div>

            <div>

                <label for="estado">Estado:</label>
                    <select name="estado" id="estado">
                            <option value="">Selecione um estado</option>
                            <option value="SP">São Paulo</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="MG">Minas Gerais</option>
                   </select>

            </div>


            <div>
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" cols="30" placeholder="Digite a sua mensagem"></textarea>  
            </div>

            <div>           
                 <button type="submit">Enviar Formulário</button>
                 <button type="reset">Limpar Formulário</button>
            </div>
        </form>

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3656.123456789!2d-46.633308!3d-23.55052!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59c0c0c0c0c0%3A0x123456789abcdef!2sSão%20Paulo%2C%20SP%2C%20Brazil!5e0!3m2!1sen!2sus!4v1616161616161" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            
    </section>


</body>
</html>
